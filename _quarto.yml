project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!archive/"

website:
  title: "JUSMER"
  description: "Justicia de mercado y Merecimiento del bienestar social"
  open-graph:
    image: twitter-card-preview_frog-small.png
    image-alt: "A Southern Brown Tree Frog with the ALA Labs logo"
  twitter-card:
    image: twitter-card-preview_frog-small.png
    image-alt: "A Southern Brown Tree Frog with the ALA Labs logo"
    card-style: summary_large_image
  site-url: https://tomasurzuam.github.io/web-proyecto/docs/index.html
  favicon: images/favicon.ico
  draft-mode: unlinked
  navbar:
    background: "#9B2626"
    foreground: "#FFFFFF"
    search: true
    logo: images/logos/jusmer-cuad-blanco.png
    right:
      - href: index.qmd
        icon: house-fill
        text: " "
      - href: software/index.qmd
        text: "Proyecto"
      - href: index.qmd#noticiash1
        text: "Noticias"
      - href: index.qmd#presentationsh1
        text: "Presentaciones"
      - href: index.qmd#publicacionesh1
        text: "Publicaciones"
      - href: index.qmd#equipoh1
        text: "Equipo"
        menu:
        - href: research/citations/index.qmd
          text: "All citations"
      - href: https://github.com/tomasurzuam/web-proyecto
        icon: github


format:
  html:
    fontsize: 1.15rem
    monofont: Fira Code
    highlight-style: arrow
    css: [theme.css, custom_theme.scss]
    toc: true
    code-overflow: scroll
    linkcolor: "#B8573E"
    include-before-body: _fathom.html

execute:
  freeze: auto



